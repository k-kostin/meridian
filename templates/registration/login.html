{% extends "base.html" %}

{% block title %}Вход{% endblock %}

{% block content %}
<section class="page-header">
    <div>
        <span class="eyebrow">Доступ</span>
        <h2>Вход в систему</h2>
        <p>Авторизуйтесь, если в рабочем контуре включено разграничение ролей.</p>
    </div>
</section>

<section class="card form-card">
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="button primary">Войти</button>
    </form>
</section>
{% endblock %}
